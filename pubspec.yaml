name: crisp_chess_engine
description: A pure-Dart chess engine — alpha-beta search with null-move pruning, PVS, quiescence and a transposition table. No native code; runs everywhere Dart does.
version: 0.1.0
repository: https://github.com/CrispStrobe/crisp_chess_engine
topics:
  - chess
  - engine
  - alpha-beta
  - game-ai

environment:
  sdk: ^3.5.0

dependencies:
  chess: ^0.8.1

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
